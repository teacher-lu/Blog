<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 自动化文章流水线</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 配置 Tailwind 允许通过 class 切换暗黑模式
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>

    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- 引入 Babel 用于在浏览器中解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 自定义滚动条样式 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(75, 85, 99, 0.5); }
    </style>
</head>
<body>
    <!-- React 应用的挂载点 -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // === 1. 图标组件定义 (替代 lucide-react) ===
        const IconWrapper = ({ children, className = "w-6 h-6" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Sun = ({className}) => <IconWrapper className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></IconWrapper>;
        const Moon = ({className}) => <IconWrapper className={className}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></IconWrapper>;
        const Upload = ({className}) => <IconWrapper className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></IconWrapper>;
        const ImageIcon = ({className}) => <IconWrapper className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></IconWrapper>;
        const CheckCircle2 = ({className}) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></IconWrapper>;
        const Circle = ({className}) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/></IconWrapper>;
        const Loader2 = ({className}) => <IconWrapper className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></IconWrapper>;
        const FileText = ({className}) => <IconWrapper className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8M16 13H8M16 17H8"/></IconWrapper>;
        const Send = ({className}) => <IconWrapper className={className}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></IconWrapper>;
        const X = ({className}) => <IconWrapper className={className}><path d="M18 6 6 18M6 6l12 12"/></IconWrapper>;
        const AlertCircle = ({className}) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconWrapper>;
        const Settings = ({className}) => <IconWrapper className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconWrapper>;

        // === 2. 主应用组件 ===
        const App = () => {
            // === 状态管理 ===
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [webhookUrl, setWebhookUrl] = useState('');
            const [topic, setTopic] = useState('');
            const [keywords, setKeywords] = useState('');
            const [images, setImages] = useState([]);
            const [errorMsg, setErrorMsg] = useState('');
            
            // 工作流状态: 'idle', 'running', 'completed', 'error'
            const [workflowState, setWorkflowState] = useState('idle');
            const [currentStep, setCurrentStep] = useState(-1);
            const [generatedHtml, setGeneratedHtml] = useState('');

            // 模拟的工作流步骤定义
            const steps = [
                { id: 0, title: '接收请求', desc: '准备数据并触发 n8n Webhook' },
                { id: 1, title: 'Gemini 生成内容', desc: '根据主题与关键词生成文章及插图提示词' },
                { id: 2, title: 'ChatGPT DALL-E 绘图', desc: '根据提取的提示词生成文章插图' },
                { id: 3, title: '组装 HTML', desc: '整合文本与图片链接进行精美排版' },
                { id: 4, title: '发布到 WordPress', desc: '上传素材至媒体库并发布文章' }
            ];

            // 监听系统主题
            useEffect(() => {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    setIsDarkMode(true);
                }
            }, []);

            // 切换主题
            const toggleTheme = () => {
                setIsDarkMode(!isDarkMode);
            };

            // 处理图片上传
            const handleImageUpload = (e) => {
                setErrorMsg('');
                const files = Array.from(e.target.files);
                
                if (images.length + files.length > 5) {
                    setErrorMsg('最多只能上传 5 张参考图片！');
                    return;
                }

                const newImages = files.map(file => ({
                    file,
                    preview: URL.createObjectURL(file),
                    name: file.name
                }));

                setImages(prev => [...prev, ...newImages]);
            };

            // 移除图片
            const removeImage = (indexToRemove) => {
                setImages(images.filter((_, index) => index !== indexToRemove));
            };

            // 模拟工作流执行
            const simulateWorkflow = async () => {
                setWorkflowState('running');
                setCurrentStep(0);
                setGeneratedHtml('');

                const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

                // 步骤 0: 触发 Webhook
                await delay(1000); 
                setCurrentStep(1);

                // 步骤 1: Gemini 生成
                await delay(2500);
                setCurrentStep(2);

                // 步骤 2: DALL-E 绘图
                await delay(3000);
                setCurrentStep(3);

                // 步骤 3: 组装 HTML
                await delay(1500);
                setCurrentStep(4);

                // 步骤 4: 发布到 WP
                await delay(2000);
                
                // 完成
                setCurrentStep(5); // 5 表示全部完成
                setWorkflowState('completed');
                
                // 生成模拟结果
                setGeneratedHtml(`
                    <div style="font-family: sans-serif; line-height: 1.6; color: ${isDarkMode ? '#e5e7eb' : '#374151'};">
                        <h1 style="font-size: 1.875rem; font-weight: bold; margin-bottom: 1rem; color: ${isDarkMode ? '#f3f4f6' : '#111827'};">关于"${topic}"的深度解析</h1>
                        <p style="margin-bottom: 1rem;">在当今飞速发展的数字时代，<strong>${keywords || '相关领域'}</strong> 的重要性日益凸显。本文将带您深入探讨这一主题，结合最新趋势与实践经验，为您提供全面的见解。</p>
                        
                        <div style="margin: 2rem 0; border-radius: 0.5rem; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
                                <div style="width: 100%; height: 250px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">
                                    [AI 生成插图: 充满科技感与创意的概念图]
                                </div>
                                <p style="text-align: center; font-size: 0.875rem; color: gray; margin-top: 0.5rem; padding-bottom: 0.5rem;">图1: ${topic} 的概念意境图 (DALL-E 3 生成)</p>
                        </div>

                        <h2 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 0.75rem; color: ${isDarkMode ? '#f3f4f6' : '#111827'};">核心观点与应用场景</h2>
                        <p style="margin-bottom: 1rem;">基于我们提交的参考资料与算法深度分析，目前行业内主要呈现以下几个显著特征：</p>
                        <ul style="list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.5rem;">
                                <li>自动化流程极大地提高了内容产出的效率。</li>
                                <li>AI 的介入使得个性化和定制化成为了可能。</li>
                                <li>系统集成（如 n8n 与 WordPress 的结合）打通了数据孤岛。</li>
                        </ul>
                        
                        <p style="margin-bottom: 1rem;">总结来说，掌握这一套自动化工作流，将为创作者节省超过 80% 的机械性劳动时间，让您能更专注于核心创意的构思与战略布局。</p>
                    </div>
                `);
            };

            // 提交表单
            const handleSubmit = () => {
                if (!webhookUrl) {
                    setErrorMsg('请输入 n8n Webhook 链接！');
                    return;
                }
                if (!topic) {
                    setErrorMsg('请输入文章主题！');
                    return;
                }
                
                // 【对接指南】 在真实应用中，请取消以下注释并删除 simulateWorkflow()
                /*
                const formData = new FormData();
                formData.append('topic', topic);
                formData.append('keywords', keywords);
                images.forEach((img, index) => {
                    formData.append(`image_${index}`, img.file);
                });

                fetch(webhookUrl, {
                    method: 'POST',
                    body: formData
                }).then(res => res.json())
                  .then(data => {
                     // 可以在这里处理 n8n 返回的数据
                  }).catch(err => {
                     setErrorMsg('网络请求失败');
                  });
                */

                // 当前运行模拟演示
                simulateWorkflow();
            };

            return (
                <div className={isDarkMode ? 'dark' : ''}>
                    <div className="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300 font-sans">
                        
                        {/* === 顶部导航栏 === */}
                        <header className="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-10 shadow-sm">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                                <div className="flex items-center space-x-3">
                                    <div className="bg-blue-600 p-2 rounded-lg text-white">
                                        <Settings className="w-6 h-6" />
                                    </div>
                                    <h1 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600 dark:from-blue-400 dark:to-purple-400">
                                        AI 自动化文章流水线
                                    </h1>
                                </div>
                                <button
                                    onClick={toggleTheme}
                                    className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                                    title="切换主题"
                                >
                                    {isDarkMode ? <Sun className="w-5 h-5 text-yellow-400" /> : <Moon className="w-5 h-5 text-gray-600" />}
                                </button>
                            </div>
                        </header>

                        {/* === 主体内容区 (三栏布局) === */}
                        <main className="max-w-[1400px] mx-auto px-4 py-8">
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 h-[calc(100vh-8rem)]">
                                
                                {/* --- 左侧：输入控制台 --- */}
                                <div className="flex flex-col bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden h-full">
                                    <div className="p-5 border-b border-gray-100 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/50">
                                        <h2 className="text-lg font-semibold flex items-center space-x-2">
                                            <FileText className="w-5 h-5 text-blue-500" />
                                            <span>创作配置</span>
                                        </h2>
                                    </div>
                                    
                                    <div className="p-5 flex-1 overflow-y-auto space-y-6 custom-scrollbar">
                                        {errorMsg && (
                                            <div className="p-3 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-lg flex items-start space-x-2 text-red-600 dark:text-red-400 text-sm">
                                                <AlertCircle className="w-5 h-5 shrink-0" />
                                                <span>{errorMsg}</span>
                                            </div>
                                        )}

                                        <div>
                                            <label className="block text-sm font-medium mb-2">n8n Webhook 链接 <span className="text-red-500">*</span></label>
                                            <input
                                                type="url"
                                                value={webhookUrl}
                                                onChange={(e) => setWebhookUrl(e.target.value)}
                                                placeholder="https://your-domain.com/webhook/..."
                                                className="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-sm"
                                                disabled={workflowState === 'running'}
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium mb-2">文章主题 <span className="text-red-500">*</span></label>
                                            <input
                                                type="text"
                                                value={topic}
                                                onChange={(e) => setTopic(e.target.value)}
                                                placeholder="例如：2026年人工智能发展趋势"
                                                className="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-sm"
                                                disabled={workflowState === 'running'}
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium mb-2">核心关键词</label>
                                            <input
                                                type="text"
                                                value={keywords}
                                                onChange={(e) => setKeywords(e.target.value)}
                                                placeholder="多个关键词用逗号分隔，如：AI, 自动化, 效率"
                                                className="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-sm"
                                                disabled={workflowState === 'running'}
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium mb-2 flex justify-between items-center">
                                                <span>参考图片 (供视觉参考)</span>
                                                <span className="text-xs text-gray-500 dark:text-gray-400">{images.length} / 5</span>
                                            </label>
                                            
                                            {images.length < 5 && (
                                                <div className="relative border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-6 text-center hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                                                    <input
                                                        type="file"
                                                        multiple
                                                        accept="image/*"
                                                        onChange={handleImageUpload}
                                                        className="absolute inset-0 w-full h-full opacity-0 cursor-pointer disabled:cursor-not-allowed"
                                                        disabled={workflowState === 'running'}
                                                    />
                                                    <div className="flex flex-col items-center pointer-events-none">
                                                        <Upload className="w-8 h-8 text-gray-400 mb-2" />
                                                        <p className="text-sm text-gray-500 dark:text-gray-400">
                                                            点击或拖拽上传图片<br/>(最多支持 5 张)
                                                        </p>
                                                    </div>
                                                </div>
                                            )}

                                            {images.length > 0 && (
                                                <div className="mt-4 grid grid-cols-5 gap-2">
                                                    {images.map((img, index) => (
                                                        <div key={index} className="relative aspect-square rounded-lg overflow-hidden border border-gray-200 dark:border-gray-700 group">
                                                            <img src={img.preview} alt="preview" className="w-full h-full object-cover" />
                                                            <button
                                                                onClick={() => removeImage(index)}
                                                                className="absolute top-1 right-1 bg-red-500/80 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity z-10"
                                                                disabled={workflowState === 'running'}
                                                            >
                                                                <X className="w-3 h-3" />
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="p-5 border-t border-gray-100 dark:border-gray-700">
                                        <button
                                            onClick={handleSubmit}
                                            disabled={workflowState === 'running'}
                                            className={`w-full py-3 px-4 rounded-lg flex items-center justify-center space-x-2 font-medium text-white transition-all
                                                ${workflowState === 'running' 
                                                    ? 'bg-blue-400 cursor-not-allowed' 
                                                    : 'bg-blue-600 hover:bg-blue-700 active:scale-[0.98]'}`}
                                        >
                                            {workflowState === 'running' ? (
                                                <>
                                                    <Loader2 className="w-5 h-5 animate-spin" />
                                                    <span>正在生成中...</span>
                                                </>
                                            ) : (
                                                <>
                                                    <Send className="w-5 h-5" />
                                                    <span>开始工作流</span>
                                                </>
                                            )}
                                        </button>
                                    </div>
                                </div>

                                {/* --- 中间：工作流可视化 --- */}
                                <div className="flex flex-col bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden h-full">
                                    <div className="p-5 border-b border-gray-100 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/50">
                                        <h2 className="text-lg font-semibold flex items-center space-x-2">
                                            <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                            <span>工作流状态监控</span>
                                        </h2>
                                    </div>
                                    
                                    <div className="p-6 flex-1 overflow-y-auto custom-scrollbar">
                                        {workflowState === 'idle' ? (
                                            <div className="h-full flex flex-col items-center justify-center text-gray-400">
                                                <Settings className="w-16 h-16 opacity-20 mb-4" />
                                                <p>等待启动任务，工作流将在此展示进度</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-8 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-gray-200 dark:before:via-gray-700 before:to-transparent">
                                                {steps.map((step, index) => {
                                                    const isCompleted = currentStep > index;
                                                    const isActive = currentStep === index;
                                                    const isPending = currentStep < index;

                                                    return (
                                                        <div key={step.id} className={`relative flex items-start ${isActive ? 'opacity-100' : isPending ? 'opacity-40' : 'opacity-80'} transition-opacity duration-300`}>
                                                            
                                                            <div className={`absolute left-0 md:left-1/2 -ml-3.5 md:-ml-4 top-0.5 w-7 h-7 md:w-8 md:h-8 rounded-full border-2 bg-white dark:bg-gray-800 flex items-center justify-center z-10 
                                                                ${isCompleted ? 'border-green-500 text-green-500' : 
                                                                isActive ? 'border-blue-500 text-blue-500 ring-4 ring-blue-500/20' : 
                                                                'border-gray-300 dark:border-gray-600 text-gray-300 dark:text-gray-600'}`}>
                                                                {isCompleted ? <CheckCircle2 className="w-5 h-5" /> : 
                                                                 isActive ? <Loader2 className="w-4 h-4 animate-spin" /> : 
                                                                 <Circle className="w-3 h-3" />}
                                                            </div>

                                                            <div className={`ml-10 md:w-1/2 md:ml-0 md:pr-12 md:text-right ${index % 2 !== 0 ? 'md:ml-auto md:pr-0 md:pl-12 md:text-left' : ''}`}>
                                                                <div className={`p-4 rounded-xl border ${isActive ? 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800 shadow-sm' : 'bg-gray-50 dark:bg-gray-900/50 border-gray-100 dark:border-gray-800'}`}>
                                                                    <h3 className="font-semibold text-sm mb-1">{step.title}</h3>
                                                                    <p className="text-xs text-gray-500 dark:text-gray-400 leading-relaxed">{step.desc}</p>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* --- 右侧：效果预览 --- */}
                                <div className="flex flex-col bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden h-full">
                                    <div className="p-5 border-b border-gray-100 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/50 flex justify-between items-center">
                                        <h2 className="text-lg font-semibold flex items-center space-x-2">
                                            <ImageIcon className="w-5 h-5 text-purple-500" />
                                            <span>最终效果预览 (WP)</span>
                                        </h2>
                                        {workflowState === 'completed' && (
                                            <span className="px-2 py-1 bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 text-xs rounded-full font-medium">
                                                发布成功
                                            </span>
                                        )}
                                    </div>
                                    
                                    <div className="flex-1 p-6 overflow-y-auto bg-gray-50/30 dark:bg-gray-900/20 custom-scrollbar">
                                        {workflowState === 'idle' ? (
                                            <div className="h-full flex flex-col items-center justify-center text-gray-400">
                                                <FileText className="w-16 h-16 opacity-20 mb-4" />
                                                <p>文章生成后将在此处实时预览</p>
                                            </div>
                                        ) : workflowState === 'running' && currentStep < 5 ? (
                                            <div className="h-full flex flex-col items-center justify-center space-y-4">
                                                <div className="relative w-24 h-24">
                                                    <div className="absolute inset-0 rounded-full border-t-2 border-blue-500 animate-spin"></div>
                                                    <div className="absolute inset-2 rounded-full border-r-2 border-purple-500 animate-spin" style={{ animationDirection: 'reverse', animationDuration: '1.5s' }}></div>
                                                    <div className="absolute inset-0 flex items-center justify-center">
                                                        <Loader2 className="w-8 h-8 text-blue-500 animate-spin" />
                                                    </div>
                                                </div>
                                                <p className="text-gray-500 dark:text-gray-400 text-sm animate-pulse">正在利用 AI 思考并编排内容...</p>
                                            </div>
                                        ) : (
                                            <div className="bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 min-h-full">
                                                <div 
                                                    dangerouslySetInnerHTML={{ __html: generatedHtml }}
                                                />
                                            </div>
                                        )}
                                    </div>
                                </div>

                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        // === 3. 挂载渲染 ===
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
