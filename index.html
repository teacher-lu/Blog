<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SEO 自动化内容工作台 (DeepSeek 驱动)</title>
    <style>
        :root {
            --bg-color: #f3f4f6; --panel-bg: #ffffff; --text-main: #1f2937; --text-muted: #6b7280;
            --border-color: #e5e7eb; --primary: #3b82f6; --primary-hover: #2563eb;
            --success: #10b981; --processing: #8b5cf6; --input-bg: #f9fafb;
        }
        [data-theme="dark"] {
            --bg-color: #0f172a; --panel-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8;
            --border-color: #334155; --primary: #3b82f6; --input-bg: #0f172a;
        }
        * { box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; height: 100vh; overflow: hidden; }
        
        .dashboard { display: grid; grid-template-columns: 350px 300px 1fr; gap: 20px; height: 100%; max-width: 1600px; margin: 0 auto; }
        .panel { background-color: var(--panel-bg); border-radius: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .panel-header { padding: 15px 20px; border-bottom: 1px solid var(--border-color); font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .panel-content { padding: 20px; overflow-y: auto; flex: 1; }
        .panel-content::-webkit-scrollbar { width: 6px; }
        .panel-content::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; font-weight: 500; }
        input[type="text"], input[type="url"] { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--input-bg); color: var(--text-main); font-size: 0.95rem; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        .submit-btn { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .preview-grid { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border-color); }

        /* Timeline 进度条样式 */
        .step { display: flex; margin-bottom: 25px; position: relative; opacity: 0.4; transition: opacity 0.3s; }
        .step::after { content: ''; position: absolute; left: 14px; top: 30px; bottom: -25px; width: 2px; background-color: var(--border-color); z-index: 1; }
        .step:last-child::after { display: none; }
        .step-icon { width: 30px; height: 30px; border-radius: 50%; background-color: var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; z-index: 2; color: var(--text-main); }
        .step-content { margin-left: 15px; flex: 1; padding-top: 5px; }
        .step-title { font-weight: 600; font-size: 0.95rem; }
        .step-desc { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
        
        .step.active { opacity: 1; }
        .step.active .step-icon { background-color: var(--processing); color: white; animation: pulse 1.5s infinite; }
        .step.done { opacity: 1; }
        .step.done .step-icon { background-color: var(--success); color: white; }
        .step.done::after { background-color: var(--success); }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(139, 92, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); } }

        /* 右侧文章渲染区 */
        #preview-box { background-color: #fff; color: #333; padding: 30px; min-height: 100%; border-radius: 8px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); line-height: 1.7; font-size: 1.05rem; }
        #preview-box h1 { font-size: 1.8rem; margin-top: 0; color: #111; }
        #preview-box h2 { font-size: 1.4rem; border-bottom: 2px solid #eee; padding-bottom: 8px; margin-top: 1.5em; color: #222; }
        #preview-box h3 { font-size: 1.2rem; color: #333; }
        #preview-box img { max-width: 100%; height: auto; border-radius: 8px; margin: 20px 0; display: block; }
        #preview-box a { color: var(--primary); text-decoration: none; font-weight: 500; }
        #preview-box a:hover { text-decoration: underline; }
        
        .placeholder-text { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; color: var(--text-muted); text-align: center; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- 左侧：输入控制台 -->
    <div class="panel">
        <div class="panel-header">
            <span>✍️ 创作配置面板</span>
            <button class="theme-toggle" id="theme-btn" style="background:none;border:none;cursor:pointer;font-size:1.2rem;">🌙</button>
        </div>
        <div class="panel-content">
            <form id="article-form">
                <div class="form-group"><label>文章主题 (Topic) *</label><input type="text" id="topic" placeholder="输入核心主题" required></div>
                <div class="form-group"><label>关键词 (Keywords) *</label><input type="text" id="keywords" placeholder="用逗号隔开" required></div>
                <div class="form-group"><label>内链产品名称 *</label><input type="text" id="p_name" placeholder="如: Thesis Hard Cover" required></div>
                <div class="form-group"><label>内链 URL *</label><input type="url" id="p_link" placeholder="https://..." required></div>
                <div class="form-group">
                    <label>参考资料图 (最多5张)</label>
                    <input type="file" id="images" accept="image/*" multiple style="font-size: 0.8rem;">
                    <div class="preview-grid" id="preview-area"></div>
                </div>
                <button type="submit" class="submit-btn" id="sub-btn">🚀 深度思考并生成</button>
            </form>
        </div>
    </div>

    <!-- 中间：工作流监控 -->
    <div class="panel">
        <div class="panel-header">⚙️ 引擎运行状态</div>
        <div class="panel-content" id="workflow-steps">
            <div class="step" id="step-1"><div class="step-icon">1</div><div class="step-content"><div class="step-title">接收与准备数据</div><div class="step-desc">解析前端变量...</div></div></div>
            <div class="step" id="step-2"><div class="step-icon">2</div><div class="step-content"><div class="step-title">DeepSeek 深度思考</div><div class="step-desc">正在应用 SEO & E-E-A-T 策略撰写...</div></div></div>
            <div class="step" id="step-3"><div class="step-icon">3</div><div class="step-content"><div class="step-title">智能提取提示词</div><div class="step-desc">解析图像生成 Prompt...</div></div></div>
            <div class="step" id="step-4"><div class="step-icon">4</div><div class="step-content"><div class="step-title">并发生成 AI 配图</div><div class="step-desc">调用云雾 API 绘制插图...</div></div></div>
            <div class="step" id="step-5"><div class="step-icon">5</div><div class="step-content"><div class="step-title">装配与回传数据</div><div class="step-desc">图文合并，生成最终 HTML...</div></div></div>
        </div>
    </div>

    <!-- 右侧：最终结果 -->
    <div class="panel">
        <div class="panel-header">👁️ 最终效果预览</div>
        <div class="panel-content" style="background-color: #f8fafc; padding: 15px;">
            <div id="preview-box">
                <div class="placeholder-text">填写左侧信息并点击生成<br><span style="font-size: 0.9rem; margin-top: 10px; opacity: 0.7;">DeepSeek 模型深度思考约需 30-60 秒，请耐心等待</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. 黑白模式切换
    const themeBtn = document.getElementById('theme-btn');
    themeBtn.onclick = () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
        themeBtn.textContent = isDark ? '🌙' : '☀️';
    };

    // 2. 图片预览处理
    let base64Files = [];
    document.getElementById('images').onchange = async (e) => {
        const files = Array.from(e.target.files).slice(0, 5);
        const previewArea = document.getElementById('preview-area');
        previewArea.innerHTML = '';
        base64Files = await Promise.all(files.map(file => {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (ex) => {
                    const img = document.createElement('img');
                    img.src = ex.target.result; img.className = 'preview-img';
                    previewArea.appendChild(img);
                    resolve(ex.target.result);
                };
                reader.readAsDataURL(file);
            });
        }));
    };

    // 3. 进度条动画控制 (专为 DeepSeek 优化了等待时长)
    let simInterval;
    function startProgressSimulation() {
        const steps = [
            { id: 1, duration: 1000 },   // 接收极快
            { id: 2, duration: 35000 },  // DeepSeek 深度思考耗时较长 (设为35秒)
            { id: 3, duration: 2000 },   // 提取极快
            { id: 4, duration: 15000 },  // 云雾 AI 绘图约 15 秒
            { id: 5, duration: 2000 }    // 合并极快
        ];
        let currentStep = 0;
        const advanceStep = () => {
            if(currentStep > 0) {
                const prev = document.getElementById(`step-${currentStep}`);
                if(prev) { prev.classList.remove('active'); prev.classList.add('done'); prev.querySelector('.step-icon').innerHTML = '✓'; }
            }
            currentStep++;
            if(currentStep <= steps.length) {
                const curr = document.getElementById(`step-${currentStep}`);
                if(curr) curr.classList.add('active');
                simInterval = setTimeout(advanceStep, steps[currentStep-1].duration);
            }
        };
        advanceStep();
    }

    function completeAllSteps() {
        clearTimeout(simInterval);
        for(let i=1; i<=5; i++) {
            const el = document.getElementById(`step-${i}`);
            el.classList.remove('active'); el.classList.add('done');
            el.querySelector('.step-icon').innerHTML = '✓';
        }
    }

    function resetSteps() {
        clearTimeout(simInterval);
        for(let i=1; i<=5; i++) {
            const el = document.getElementById(`step-${i}`);
            el.classList.remove('active', 'done');
            el.querySelector('.step-icon').innerHTML = i;
        }
    }

    // 4. 表单提交核心逻辑
    document.getElementById('article-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sub-btn');
        const previewBox = document.getElementById('preview-box');
        
        btn.disabled = true; btn.textContent = "🧠 引擎高速运转中...";
        previewBox.innerHTML = '<div class="placeholder-text"><div style="font-size:2rem; margin-bottom:15px;">⏳</div>正在耐心等待 DeepSeek 深度思考与图文合成...</div>';
        resetSteps();
        startProgressSimulation();
        
        try {
            // 【⚠️ 替换为你的正式/测试 Webhook 地址】
            const N8N_WEBHOOK_URL = "https://api.wallyai.top/webhook/article-gen";

            const response = await fetch(N8N_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    topic: document.getElementById('topic').value,
                    keywords: document.getElementById('keywords').value,
                    product_name: document.getElementById('p_name').value,
                    product_link: document.getElementById('p_link').value,
                    images: base64Files
                })
            });

            console.log("11111", response); 

            if (response.ok) {
                const data = await response.json();
                console.log("n8n 返回的原始数据:", data); 
                completeAllSteps(); 
                
                let finalHtml = "";
                // 适配 Respond to Webhook 可能返回的数组或对象格式
                if (Array.isArray(data) && data.length > 0) {
                    finalHtml = data[0].final_article_html || "";
                } else if (data && typeof data === 'object') {
                    finalHtml = data.final_article_html || "";
                }

                if (!finalHtml) {
                     finalHtml = "<p>数据获取成功，但未能在 JSON 中找到 final_article_html 字段。</p>";
                }

                // 终极清洗：消除可能遗留的转义符
                finalHtml = finalHtml.replace(/\\n/g, '').replace(/\n/g, ''); 
                previewBox.innerHTML = finalHtml;

            } else {
                throw new Error(`HTTP 状态码: ${response.status}`);
            }
        } catch (error) {
            clearTimeout(simInterval);
            console.error("请求被中断:", error);
            
            let errorMsg = error.message;
            if (error.message.includes('Failed to fetch')) {
                errorMsg = `网络请求被切断。请排查：<br><br>
                            1. <b>超时问题 (最可能)：</b>DeepSeek 耗时较长，请确保 Nginx/宝塔 的超时时间大于 120 秒。<br>
                            2. <b>CORS 跨域：</b>确保 n8n Webhook 节点开启了响应跨域。<br>
                            3. <b>文件体积：</b>若上传了图片，请检查 Nginx 的 client_max_body_size。`;
            }
            previewBox.innerHTML = `<div class="placeholder-text" style="color:#ef4444; text-align:left; font-size: 1rem; width: 80%;">
                <b>❌ 生成失败:</b><br><br>${errorMsg}
            </div>`;
            
            // 失败时进度条停滞显红
            document.querySelectorAll('.step.active .step-icon').forEach(el => {
                el.style.backgroundColor = '#ef4444'; el.style.animation = 'none';
            });
        } finally {
            btn.disabled = false; btn.textContent = "🚀 深度思考并生成";
        }
    };
</script>

</body>
</html>
