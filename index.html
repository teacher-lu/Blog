<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 自动化文章生成器</title>
    <style>
        :root {
            /* 白天模式变量 */
            --bg-color: #f3f4f6;
            --container-bg: #ffffff;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --border-color: #d1d5db;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --input-bg: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        [data-theme="dark"] {
            /* 黑夜模式变量 */
            --bg-color: #111827;
            --container-bg: #1f2937;
            --text-color: #f9fafb;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --primary-color: #60a5fa;
            --primary-hover: #3b82f6;
            --input-bg: #374151;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 1rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        input[type="file"] {
            display: block;
            margin-bottom: 10px;
            color: var(--text-color);
        }

        /* 图片预览区 */
        .preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .preview-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
        }

        .submit-btn:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        #status-msg {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
        }

        .success { color: #10b981; }
        .error { color: #ef4444; }
        .loading { color: var(--primary-color); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>内容生成器</h1>
            <button class="theme-toggle" id="theme-btn" title="切换白天/黑夜模式">🌙</button>
        </div>

        <form id="article-form">
            <div class="form-group">
                <label for="topic">文章主题 *</label>
                <input type="text" id="topic" placeholder="例如：人工智能在医疗领域的应用" required>
            </div>

            <div class="form-group">
                <label for="keywords">关键词 *</label>
                <input type="text" id="keywords" placeholder="例如：AI, 医疗, 诊断, 未来趋势" required>
            </div>

            <div class="form-group">
                <label for="images">参考图片 (最多 5 张)</label>
                <input type="file" id="images" accept="image/png, image/jpeg, image/jpg, image/webp" multiple>
                <div class="preview-container" id="preview-container"></div>
                <small style="color: var(--text-muted);">仅作为生成灵感参考，支持 JPG, PNG格式</small>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">开始生成并发布</button>
        </form>

        <div id="status-msg"></div>
    </div>

    <script>
        // 1. 白天/黑夜模式切换逻辑
        const themeBtn = document.getElementById('theme-btn');
        let isDarkMode = false;

        themeBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.textContent = '☀️';
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.textContent = '🌙';
            }
        });

        // 2. 图片选择与预览逻辑 (限制最多5张)
        const imageInput = document.getElementById('images');
        const previewContainer = document.getElementById('preview-container');
        let selectedFiles = [];

        imageInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            
            if (files.length > 5) {
                alert("最多只能上传 5 张图片！请重新选择。");
                imageInput.value = ""; // 清空选择
                previewContainer.innerHTML = "";
                selectedFiles = [];
                return;
            }

            selectedFiles = files;
            previewContainer.innerHTML = ""; // 清空旧预览

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-image';
                    previewContainer.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });

        // 3. 将文件转换为 Base64，方便发送给 n8n
        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // 4. 表单提交与 n8n Webhook 交互
        const form = document.getElementById('article-form');
        const submitBtn = document.getElementById('submit-btn');
        const statusMsg = document.getElementById('status-msg');

        // 【！！！重要！！！】在这里填入你 n8n 的 Webhook URL
        const N8N_WEBHOOK_URL = "http://你的N8N地址/webhook/article-gen-webhook"; 

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const topic = document.getElementById('topic').value.trim();
            const keywords = document.getElementById('keywords').value.trim();

            if (!topic || !keywords) {
                alert("请输入主题和关键词");
                return;
            }

            // 按钮状态：加载中
            submitBtn.disabled = true;
            submitBtn.textContent = "生成中，请耐心等待...";
            statusMsg.textContent = "正在上传数据至工作流...";
            statusMsg.className = "loading";

            try {
                // 转换所有图片为 Base64
                const base64Images = await Promise.all(selectedFiles.map(file => fileToBase64(file)));

                // 构建请求 Payload
                const payload = {
                    topic: topic,
                    keywords: keywords,
                    reference_images: base64Images 
                };

                // 发起请求到 n8n
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusMsg.textContent = "✅ 工作流已成功触发！文章正在生成并发布中。";
                    statusMsg.className = "success";
                    form.reset();
                    previewContainer.innerHTML = "";
                    selectedFiles = [];
                } else {
                    throw new Error(`HTTP 错误: ${response.status}`);
                }
            } catch (error) {
                console.error("Webhook Error:", error);
                statusMsg.textContent = "❌ 请求失败，请检查网络或 Webhook 地址配置。";
                statusMsg.className = "error";
            } finally {
                // 恢复按钮状态
                submitBtn.disabled = false;
                submitBtn.textContent = "开始生成并发布";
            }
        });
    </script>
</body>
</html>
